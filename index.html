<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>环境监测系统</title>
</head>
<body>

<h1>传感器数据</h1>

<p>温度: <span id="temp">--</span></p>
<p>CO浓度: <span id="co">--</span></p>
<p>火灾状态: <span id="fire">--</span></p>

<script>
const channelID = "3307131";

function getData() {
    fetch(`https://api.thingspeak.com/channels/${channelID}/feeds/last.json`)
        .then(response => response.json())
        .then(data => {
            document.getElementById("temp").innerText = data.field1;
            document.getElementById("co").innerText = data.field2;
            document.getElementById("fire").innerText = data.field3;
        })
        .catch(err => console.error(err));
}

// 每5秒刷新一次
setInterval(getData, 5000);

// 页面加载先执行一次
getData();
</script>

</body>
</html>
